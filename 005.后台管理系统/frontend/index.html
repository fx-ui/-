<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>每日记账 - 后台管理</title>
<style>
:root{--p:#4F46E5;--pl:#818CF8;--pd:#3730A3;--bg:#F1F5F9;--s:#fff;--in:#10B981;--ex:#EF4444;--wa:#F59E0B;--ac:#8B5CF6;--t:#1E293B;--ts:#64748B;--tl:#94A3B8;--r:12px;--sh:0 1px 3px rgba(0,0,0,.08);--f:'PingFang SC','Microsoft YaHei',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:var(--f);color:var(--t);background:var(--bg);-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none;outline:none}
input,textarea,select{font:inherit;font-size:15px;outline:none;border:none;background:none}
a{color:inherit;text-decoration:none}
#app{width:100%;max-width:1400px;margin:0 auto;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100vh;background:#1E293B;color:#fff;z-index:100;display:flex;flex-direction:column}
.sidebar-logo{padding:24px 20px;font-size:20px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-nav{flex:1;padding:12px}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;color:#94A3B8;cursor:pointer;transition:all .15s;margin-bottom:4px;text-decoration:none;font-size:14px}
.sidebar-item:hover{background:rgba(255,255,255,.05);color:#fff}
.sidebar-item.active{background:var(--p);color:#fff}
.sidebar-icon{font-size:18px}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:13px;color:#94A3B8}
.main-area{margin-left:220px;padding:24px}
.card{background:var(--s);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;transition:all .15s;min-height:40px}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--p);color:#fff}
.btn-o{background:transparent;color:var(--p);border:1.5px solid var(--p)}
.btn-d{background:var(--ex);color:#fff}
.btn-s{padding:6px 12px;font-size:13px}
.btn-b{width:100%}
.inp{width:100%;height:44px;padding:0 14px;background:var(--bg);border:1.5px solid transparent;border-radius:8px;font-size:15px;color:var(--t);transition:all .15s}
.inp:focus{border-color:var(--p);background:var(--s)}
.sel{width:100%;height:44px;padding:0 14px;background:var(--bg);border:1.5px solid transparent;border-radius:8px;font-size:15px}
.ig{margin-bottom:12px}.il{display:block;font-size:13px;font-weight:600;color:var(--ts);margin-bottom:4px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
.stat-card{background:var(--s);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.stat-label{font-size:13px;color:var(--ts);margin-bottom:4px}
.stat-value{font-size:28px;font-weight:700}
.stat-sub{font-size:12px;color:var(--tl);margin-top:2px}
.table-ct{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:12px 14px;border-bottom:1px solid #E2E8F0;font-size:14px}
th{font-weight:600;color:var(--ts);font-size:13px;background:#F8FAFC}
tr:hover{background:#F8FAFC}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600}
.badge-on{background:#D1FAE5;color:#065F46}
.badge-off{background:#FEE2E2;color:#991B1B}
.badge-in{background:#D1FAE5;color:#065F46}
.badge-ex{background:#FEE2E2;color:#991B1B}
.pagination{display:flex;gap:8px;align-items:center;justify-content:center;padding:16px 0}
.filter-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.filter-bar .inp,.filter-bar .sel{width:auto;min-width:140px}
.toast-ct{position:fixed;top:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:none}
.toast{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;color:#fff;animation:bo .3s ease}
.toast-ok{background:#10B981}.toast-err{background:#EF4444}.toast-info{background:var(--p)}
@keyframes bo{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.login-box{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1E293B,#3730A3)}
.login-card{background:#fff;border-radius:16px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.empty{display:flex;flex-direction:column;align-items:center;padding:48px 24px;text-align:center}
.empty-i{font-size:48px;margin-bottom:12px}.empty-t{font-weight:600;margin-bottom:4px;font-size:15px}.empty-d{font-size:13px;color:var(--ts)}
.fw{font-weight:700}.tc{text-align:center}.ts{color:var(--ts)}.te{color:var(--ex)}.ti{color:var(--in)}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}
.fx{display:flex}.fc{flex-direction:column}.aic{align-items:center}.jcc{justify-content:center}.jsb{justify-content:space-between}.f1{flex:1}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
@media(max-width:768px){.sidebar{display:none}.main-area{margin-left:0}.stats-grid{grid-template-columns:repeat(2,1fr)}.filter-bar{flex-direction:column}.filter-bar .inp,.filter-bar .sel{width:100%}}
</style>
</head>
<body>
<div class="sidebar" id="sidebar" style="display:none">
  <div class="sidebar-logo">🔧 后台管理</div>
  <nav class="sidebar-nav">
    <a class="sidebar-item active" href="#/dashboard" data-hash="#/dashboard"><span class="sidebar-icon">📊</span> 数据仪表盘</a>
    <a class="sidebar-item" href="#/users" data-hash="#/users"><span class="sidebar-icon">👥</span> 用户管理</a>
    <a class="sidebar-item" href="#/records" data-hash="#/records"><span class="sidebar-icon">📋</span> 流水管理</a>
    <a class="sidebar-item" href="#/stats" data-hash="#/stats"><span class="sidebar-icon">📈</span> 统计分析</a>
    <a class="sidebar-item" href="#/categories" data-hash="#/categories"><span class="sidebar-icon">📂</span> 分类管理</a>
    <a class="sidebar-item" href="#/admins" data-hash="#/admins" id="nav-admins"><span class="sidebar-icon">👑</span> 管理员管理</a>
  </nav>
  <div class="sidebar-footer">
    <div id="sidebar-user">未登录</div>
    <button id="sidebar-logout" style="color:#EF4444;margin-top:8px;font-size:12px;cursor:pointer">🚪 退出</button>
  </div>
</div>
<div class="main-area" id="main-area">
  <div id="app"></div>
</div>
<div class="toast-ct" id="toasts"></div>
<script type="module" src="js/app.js?v=1"></script>
</body>
</html>
